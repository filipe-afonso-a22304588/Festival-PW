{% extends 'festival/layout.html' %}

{% block content %}

{% load static %}    
{% for dia in dias %}
<h3>{{dia}}</h3>

    {% for concerto in dia.concertos.all %}
        <article class="card">
            <a href="{% url 'concerto' concerto.id %}">{{ concerto.banda.nome }} - {{ concerto.dia }}, {{ concerto.hora }}</a>
        </article>
    {% endfor %}

{% endfor %}

{% endblock %}
